version: '3.9'

services: 
  api:
    build: .
    container_name: clinica_api
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      - db
  db:
    image: postgres:15
    container_name: clinica_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clinica
    ports:
      - "5433:5433"
  
  adminer:
    image: adminer
    container_name: clinica_adminer
    ports:
      - "8080:8080" 